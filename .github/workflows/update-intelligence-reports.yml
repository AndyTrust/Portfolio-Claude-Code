name: Update Intelligence Reports + Data JSON

on:
  push:
    paths:
      - 'reports/intelligence_*.md'
      - 'data/market_data.json'
      - 'data/insider_data.json'
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Ogni giorno alle 07:30 UTC (09:30 ora italiana)
    - cron: '30 7 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── STEP 1: Rigenera intelligence-reports.js da markdown ──────────────
      - name: Generate intelligence-reports.js from markdown files
        run: |
          python3 << 'PYEOF'
          import json, os, re

          reports_dir = "reports"
          js_out = "js/intelligence-reports.js"

          md_files = sorted([
              f for f in os.listdir(reports_dir)
              if f.startswith("intelligence_") and f.endswith(".md")
              and not "weekly" in f and not "monthly" in f
          ])

          reports = []
          for fname in md_files:
              m = re.match(r"intelligence_(\d{4})(\d{2})(\d{2})\.md", fname)
              if not m:
                  continue
              date_str = f"{m.group(1)}-{m.group(2)}-{m.group(3)}"
              fpath = os.path.join(reports_dir, fname)
              with open(fpath, "r", encoding="utf-8") as f:
                  raw = f.read()
              reports.append({"date": date_str, "raw": raw})

          reports.sort(key=lambda x: x["date"])
          dates_list = ", ".join(r["date"] for r in reports)

          lines = [
              "// AUTO-GENERATED by GitHub Actions — do not edit manually",
              f"// Daily reports: {dates_list}",
              "",
              "const INTELLIGENCE_REPORTS = ["
          ]
          for i, r in enumerate(reports):
              comma = "," if i < len(reports) - 1 else ""
              entry = json.dumps(r, ensure_ascii=False)
              lines.append(f"  {entry}{comma}")
          lines.append("];")
          lines.append("")

          with open(js_out, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"Generated {len(reports)} daily reports -> {js_out}")
          PYEOF

      # ── STEP 2: Aggiorna timestamp in market_data.json ────────────────────
      - name: Update market_data.json timestamp
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          path = "data/market_data.json"
          if not os.path.exists(path):
              print("market_data.json not found, skipping")
          else:
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
              # Aggiorna solo il timestamp — i prezzi vengono aggiornati dal task schedulato
              data["lastChecked"] = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              data["source"] = "EOD prices — aggiornati dal task schedulato + GitHub Actions timestamp"
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"Updated market_data.json timestamp")
          PYEOF

      # ── STEP 3: Aggiorna timestamp in insider_data.json ───────────────────
      - name: Update insider_data.json timestamp check
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          path = "data/insider_data.json"
          if not os.path.exists(path):
              print("insider_data.json not found, skipping")
          else:
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
              data["lastChecked"] = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print("Updated insider_data.json timestamp")
          PYEOF

      # ── STEP 4: Commit e push ─────────────────────────────────────────────
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/intelligence-reports.js data/market_data.json data/insider_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update data + reports ($(date '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
