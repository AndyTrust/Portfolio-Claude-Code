name: Update Intelligence Reports JS

on:
  push:
    paths:
      - 'reports/intelligence_*.md'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate intelligence-reports.js from markdown files
        run: |
          python3 << 'PYEOF'
          import json, os, re

          reports_dir = "reports"
          js_out = "js/intelligence-reports.js"

          md_files = sorted([
              f for f in os.listdir(reports_dir)
              if f.startswith("intelligence_") and f.endswith(".md")
          ])

          reports = []
          for fname in md_files:
              m = re.match(r"intelligence_(\d{4})(\d{2})(\d{2})\.md", fname)
              if not m:
                  continue
              date_str = f"{m.group(1)}-{m.group(2)}-{m.group(3)}"
              fpath = os.path.join(reports_dir, fname)
              with open(fpath, "r", encoding="utf-8") as f:
                  raw = f.read()
              reports.append({"date": date_str, "raw": raw})

          reports.sort(key=lambda x: x["date"])
          dates_list = ", ".join(r["date"] for r in reports)

          lines = [
              "// AUTO-GENERATED by GitHub Actions — do not edit manually",
              f"// Reports from: {dates_list}",
              "",
              "const INTELLIGENCE_REPORTS = ["
          ]

          for i, r in enumerate(reports):
              comma = "," if i < len(reports) - 1 else ""
              entry = json.dumps(r, ensure_ascii=False)
              lines.append(f"  {entry}{comma}")

          lines.append("];")
          lines.append("")

          with open(js_out, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"Generated {len(reports)} reports -> {js_out}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/intelligence-reports.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update intelligence-reports.js ($(date '+%Y-%m-%d'))"
            git push
          fi
