<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <!-- Mars sphere gradient -->
    <radialGradient id="mars" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8B3A2A"/>
      <stop offset="40%" stop-color="#6B2A1A"/>
      <stop offset="100%" stop-color="#1a0a05"/>
    </radialGradient>
    <!-- Italian flag diagonal gradients -->
    <linearGradient id="green-stripe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#009246"/>
      <stop offset="100%" stop-color="#006830"/>
    </linearGradient>
    <linearGradient id="red-stripe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE2B37"/>
      <stop offset="100%" stop-color="#9B1A22"/>
    </linearGradient>
    <!-- Clip for the X shape -->
    <clipPath id="x-clip-left">
      <polygon points="60,30 200,30 200,390 60,390"/>
    </clipPath>
    <clipPath id="x-clip-right">
      <polygon points="200,30 340,30 340,390 200,390"/>
    </clipPath>
  </defs>

  <!-- Black background -->
  <rect width="400" height="420" fill="#000000"/>

  <!-- Mars sphere (behind the X) -->
  <circle cx="200" cy="195" r="105" fill="url(#mars)" opacity="0.85"/>

  <!-- X shape — white outlined strokes, thick -->
  <!-- Left-top to right-bottom diagonal (white) -->
  <line x1="68" y1="38" x2="332" y2="352" stroke="white" stroke-width="52" stroke-linecap="square"/>
  <!-- Right-top to left-bottom diagonal (white) -->
  <line x1="332" y1="38" x2="68" y2="352" stroke="white" stroke-width="52" stroke-linecap="square"/>

  <!-- Italian flag overlay — left diagonal (green, left half) -->
  <g clip-path="url(#x-clip-left)">
    <line x1="68" y1="38" x2="332" y2="352" stroke="url(#green-stripe)" stroke-width="22" stroke-linecap="square"/>
  </g>
  <!-- Italian flag overlay — right diagonal (red, right half) -->
  <g clip-path="url(#x-clip-right)">
    <line x1="332" y1="38" x2="68" y2="352" stroke="url(#red-stripe)" stroke-width="22" stroke-linecap="square"/>
  </g>

  <!-- @ItaloMarziano text -->
  <text x="200" y="396" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">@ItaloMarziano</text>

  <!-- Small 4-pointed star bottom right -->
  <g transform="translate(378, 406) scale(0.7)">
    <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z" fill="#888" opacity="0.8"/>
  </g>
</svg>
